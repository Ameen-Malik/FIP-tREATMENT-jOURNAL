<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E24"/>
      <stop offset="100%" stop-color="#0E0E12"/>
    </linearGradient>
    <!-- Heart Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base Squircle -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>
  
  <!-- Subtle Inner Border -->
  <rect x="12" y="12" width="488" height="488" rx="108" stroke="rgba(255, 255, 255, 0.05)" stroke-width="6"/>

  <!-- Logo Group -->
  <g transform="translate(0, 5)">
    <!-- Cat Ears -->
    <path d="M195 160 L210 90 L245 145 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M317 160 L302 90 L267 145 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Cat Head -->
    <circle cx="256" cy="180" r="55" fill="url(#bgGrad)" stroke="#FFFFFF" stroke-width="12"/>
    
    <!-- Eyes (closed/peaceful curves) -->
    <path d="M222 178 C226 186, 238 186, 242 178" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M270 178 C274 186, 286 186, 290 178" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Nose / Whiskers -->
    <path d="M251 196 L256 201 L261 196" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Cat Body (minimalist geometric shield/heart outline) -->
    <path d="M190 230 C160 300, 170 410, 256 410 C342 410, 352 300, 322 230 Z" fill="url(#bgGrad)" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Curly tail -->
    <path d="M322 360 C380 360, 390 280, 360 250 C345 235, 335 250, 345 260 C355 270, 350 320, 320 320" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Glowing Green Medical Cross / Heart -->
    <path d="M256 315 C256 315, 226 280, 226 260 C226 242, 238 232, 256 232 C274 232, 286 242, 286 260 C286 280, 256 315, 256 315 Z" fill="#30D158" filter="url(#glow)"/>
  </g>
</svg>
